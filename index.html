<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MEA Assistant Developer v5</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mode-idle-active">

  <!-- Efek Visual Grain MEA -->
  <div class="grain" aria-hidden="true"></div>
  
  <!-- Aura Tingkat Dinamis (Dynamic Glow Layers) -->
  <div class="aura-container" aria-hidden="true">
    <div class="aura-layer aura-base"></div>
    <div class="aura-layer aura-core-heavy"></div>
  </div>

  <!-- ── SIDEBAR HISTORY (DRAWER MODERN) ── -->
  <div id="sidebar-history" class="sidebar-hidden">
    <div class="sidebar-header">
      <h3>Chat History</h3>
      <button class="btn-close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    <div id="history-list-container">
      <!-- Diisi dinamis oleh app.js -->
      <div class="history-empty">Belum ada riwayat chat</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-delete-all" onclick="clearAllHistoryFromDB()">Wipe All History</button>
    </div>
  </div>

  <!-- ── MAIN WRAPPER SCREEN (Pas 1 Layar Penuh) ── -->
  <div id="app-container">
    
    <!-- ── TOP NAVBAR MINIMALIS (Gaya ChatGPT Modern) ── -->
    <nav id="navbar">
      <div class="nav-left">
        <button class="btn-icon-nav" onclick="toggleSidebar()" title="Buka History">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </button>
        <span class="nav-brand">MEA Assistant Developer</span>
      </div>
      <div class="nav-right">
        <div class="mode-pill-container">
          <button class="mode-pill active" id="pill-idle" onclick="changeSystemMode('idle')">Idle</button>
          <button class="mode-pill" id="pill-auto" onclick="changeSystemMode('auto')">Auto</button>
          <button class="mode-pill" id="pill-core" onclick="changeSystemMode('core')">Core</button>
        </div>
        <span class="nav-divider">|</span>
        <span class="nav-home-btn" onclick="resetToHome()">Home</span>
      </div>
    </nav>

    <!-- ── APP MAIN VIEWPORT ── -->
    <main id="main-viewport">
      
      <!-- Area Chat Independen (Bisa Di-scroll) -->
      <div id="chat-scroller">
        <div id="chat-container-minimal">
          <!-- Pesan masuk di sini -->
        </div>
      </div>

      <!-- Live Process Status Ringan -->
      <div id="process-toast" class="toast-hidden">
        <span class="pulse-indicator"></span>
        <span id="process-toast-text">Thinking...</span>
      </div>

      <!-- Panel Pending Drafts Terintegrasi -->
      <div id="draft-floating-panel" class="panel-hidden">
        <div class="draft-panel-header">
          <span>◈ Pending Dev Archives (<span id="draft-count">0</span>)</span>
          <button onclick="loadDrafts()">↻</button>
        </div>
        <div id="draft-item-rows"></div>
      </div>

      <!-- Fixed Bottom Input Controller -->
      <div id="input-fixed-bottom">
        <div class="input-card-box">
          <textarea
            id="question-input"
            rows="1"
            placeholder="Tanyakan kode atau instruksi arsitektur website..."
          ></textarea>
          
          <div class="input-action-bar">
            <span class="credit-counter" id="credit-count">0 / 10,000 Credits</span>
            <button id="execute-btn" onclick="executePrompt()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </div>
        
        <!-- ── FIXED LICENSE FOOTER (Satu Layar Terkunci) ── -->
        <footer id="minimal-license">
          <span>© 2026 MEA Studio Lab · Dark Cinematic Minimalist Engine</span>
        </footer>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
