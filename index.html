<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MEA Assistant v5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="mode-idle-active">

  <div class="grain" aria-hidden="true"></div>
  
  <!-- Aura Layers -->
  <div class="aura-container" aria-hidden="true">
    <div class="aura-layer aura-base"></div>
    <div class="aura-layer aura-core-heavy"></div>
  </div>

  <!-- ── SIDEBAR DRAWER ── -->
  <div id="sidebar-history" class="sidebar-hidden">
    <div class="sidebar-header">
      <h3>Sesi Arsitektur</h3>
      <button class="btn-close-sidebar" onclick="toggleSidebar()">✕</button>
    </div>
    <div id="history-list-container">
      <div class="history-empty">Belum ada riwayat chat</div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-delete-all" onclick="clearAllHistoryFromDB()">Wipe History</button>
    </div>
  </div>

  <!-- ── APPS MAIN CONTENT WRAPPER (FIXED 100% VIEWPORT) ── -->
  <div id="app-viewport">
    
    <!-- NAVBAR MINIMALIS -->
    <nav id="navbar">
      <button class="btn-icon-nav" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
      </button>
      
      <!-- SWIFT TOGGLE SLIDER (Metode Switch Modern) -->
      <div class="swift-slider-container">
        <div class="swift-bg-slider" id="swift-track"></div>
        <button class="swift-btn active" onclick="swiftMode('idle', 0)">Idle</button>
        <button class="swift-btn" onclick="swiftMode('auto', 33.33)">Auto</button>
        <button class="swift-btn" onclick="swiftMode('core', 66.66)">Core</button>
      </div>

      <span class="nav-home-btn" onclick="resetToHome()">Reset</span>
    </nav>

    <!-- AREA CHAT UTAMA (HANYA INI YANG BISA DI-SCROLL) -->
    <div id="chat-scroll-area">
      <div id="chat-dynamic-wall">
        <!-- Message bubble masuk ke sini -->
      </div>
    </div>

    <!-- PANEL PENDING DRAFTS (FLOATING INLINE) -->
    <div id="draft-floating-panel" class="panel-hidden">
      <div class="draft-panel-header">
        <span>◈ Pending Dev Archives (<span id="draft-count">0</span>)</span>
        <button onclick="loadDrafts()">↻</button>
      </div>
      <div id="draft-item-rows"></div>
    </div>

    <!-- AREA BAWAH FIXED (INPUT & FOOTER) -->
    <div id="bottom-dock-container">
      
      <!-- Live Process Toast -->
      <div id="process-toast" class="toast-hidden">
        <span class="pulse-indicator"></span>
        <span id="process-toast-text">Thinking...</span>
      </div>

      <div class="input-modern-wrapper">
        <textarea id="question-input" rows="1" placeholder="Kirim instruksi arsitektur kode ke MEA..."></textarea>
        <div class="input-action-row">
          <span class="credit-counter" id="credit-count">0 / 10K Credits</span>
          <button id="execute-btn" onclick="executePrompt()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
      
      <footer id="footer-branding">
        © 2026 MEA Lab · Dark Cinematic Engine
      </footer>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
